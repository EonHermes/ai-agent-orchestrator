version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchestrator-backend
    environment:
      - ORCHESTRATOR_SERVER_HOST=0.0.0.0
      - ORCHESTRATOR_SERVER_PORT=8081
      - ORCHESTRATOR_DATABASE_URL=sqlite:/data/orchestrator.db
      - ORCHESTRATOR_LLM_OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-your_key_here}
      - ORCHESTRATOR_LLM_OPENROUTER_MODEL=anthropic/claude-3-opus
      - ORCHESTRATOR_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:80
      - ORCHESTRATOR_LOGGING_LEVEL=info
      - RUST_LOG=info
    volumes:
      - ./data:/data
    ports:
      - "8081:8081"  # Expose for direct API access (optional)
    networks:
      - orchestrator-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # For production, add:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #     reservations:
    #       memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orchestrator-frontend
    ports:
      - "3000:80"
    networks:
      - orchestrator-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  orchestrator-network:
    driver: bridge

volumes:
  data:
