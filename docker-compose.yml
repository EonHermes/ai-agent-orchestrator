version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task-dashboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-dashboard-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/task_dashboard
      RUST_LOG: debug
      CORS_ALLOW_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests
      - cargo-cache:/usr/local/cargo/registry
      - target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
    command: cargo run --bin task-dashboard-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-dashboard-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/dist
    depends_on:
      - backend

volumes:
  postgres_data:
  cargo-cache:
  target:
